openapi: 3.0.3
servers:
  - url: "http://localhost:3000"
info:
  title: Fantastic Coffee (decaffeinated)
  description: Fantastic Coffee (decaffeinated), the skeleton project for Web and Software architecture course
  version: 1.0.0
  /:
    get:
      tags: ["General"]
      operationId: index
      summary: Get an index
      description: |-
        Returns "Hello World!" as plain text.
      responses:
        "200":
          description: Successful
          content:
            text/plain:
              schema: { type: string }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /context:
    get:
      tags: ["General"]
      operationId: getContextReply
      summary: Example of context-aware endpoint
      description: |-
        Returns "Hello World!" as plain text using RequestContext.
      responses:
        "200":
          description: Successful
          content:
            text/plain:
              schema: { type: string }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /liveness:
    get:
      tags: ["General"]
      operationId: liveness
      summary: Liveness check
      description: |-
        Checks if the server is alive and serving requests.
      responses:
        "200":
          description: Server is alive
        "500": { $ref: "#/components/responses/InternalServerError" }

  /session:
    post:
      tags: ["Session"]
      operationId: doLogin
      summary: Logs in the user
      description: |-
        If the user does not exist, it will be created, and an identifier is returned.
        If the user exists, the user identifier is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: User log-in action successful
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [identifier]
                properties:
                  identifier:
                    type: string
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalServerError" }
                  pattern: '^[a-zA-Z0-9]+$'
                  minLength: 3
                  maxLength: 255
                password:
                  type: string
                  pattern: '^.*?$'
                  minLength: 8
                  maxLength: 255
      responses:
        "200":
          description: Login successful
          headers:
            X-Access-Token:
              description: Access token for authenticated requests
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403":
          description: Login failed
          headers:
            X-Message:
              description: Error message
              schema: { type: string }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /me/name:
    put:
      operationId: setMyUserName
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 16
      responses:
        "204":
          description: Username updated successfully
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /conversations:
    get:
      operationId: getMyConversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /messages:
    post:
      operationId: sendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                conversationId:
                  type: string
                text:
                  type: string
                  minLength: 1
                isGroup:
                  type: boolean
                name:
                  type: string
                participants:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                required: [conversationId, messageId]
                properties:
                  conversationId:
                    type: string
                  messageId:
                    type: string
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /groups/{groupId}/members:
    post:
      operationId: addToGroup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberId]
              properties:
                memberId:
                  type: string
      responses:
        "204":
          description: Member added
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /groups/{groupId}/leave:
    post:
      operationId: leaveGroup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Left group
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /groups/{groupId}/name:
    put:
      operationId: setGroupName
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        "204":
          description: Group name set
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /messages/{messageId}:
    delete:
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Message deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /messages/{messageId}/forward:
    post:
      operationId: forwardMessage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId]
              properties:
                conversationId:
                  type: string
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                type: object
                required: [conversationId, messageId]
                properties:
                  conversationId:
                    type: string
                  messageId:
                    type: string
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Source message deleted
        "500": { $ref: "#/components/responses/InternalServerError" }

  /messages/{messageId}/comment:
    post:
      operationId: commentMessage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
                  minLength: 1
      responses:
        "204":
          description: Comment added
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Message deleted
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      operationId: uncommentMessage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Comment removed
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Message deleted
        "500": { $ref: "#/components/responses/InternalServerError" }

  /messages/{messageId}:
    delete:
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Message deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /me/photo:
    put:
      operationId: setMyPhoto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Photo updated successfully
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413":
          description: Payload Too Large
        "415":
          description: Unsupported Media Type
        "500": { $ref: "#/components/responses/InternalServerError" }
    get:
      operationId: getMyPhoto
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User photo found
          content:
            image/png:
              schema: { type: string, format: binary }
            image/jpeg:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      operationId: deleteMyPhoto
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Photo deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /users:
    get:
      operationId: searchUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of users matching search criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /users/{username}/photo:
    get:
      operationId: getUserPhoto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User photo found
          content:
            image/png:
              schema: { type: string, format: binary }
            image/jpeg:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /groups/{groupId}/photo:
    put:
      operationId: setGroupPhoto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Photo updated successfully
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "413":
          description: Payload Too Large
        "415":
          description: Unsupported Media Type
        "500": { $ref: "#/components/responses/InternalServerError" }
    get:
      operationId: getGroupPhoto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group photo found
          content:
            image/png:
              schema: { type: string, format: binary }
            image/jpeg:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

components:
  schemas:
    User:
      type: object
      required: [name]
      properties:
        name:
          type: string
        identifier:
          type: string

    Message:
      type: object
      required: [id, conversationId, senderId, text, createdAt]
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        deleted:
          type: boolean
        comment:
          type: string
        commentedAt:
          type: string
          format: date-time
        forwardedFrom:
          type: string

    Conversation:
      type: object
      required: [conversationId, participants, messages]
      properties:
        conversationId:
          type: string
        participants:
          type: array
          items:
            type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        isGroup:
          type: boolean
        name:
          type: string

    ConversationSummary:
      type: object
      required: [id, isGroup, name, participants, lastMessageAt, lastMessageText]
      properties:
        id:
          type: string
        isGroup:
          type: boolean
        name:
          type: string
        participants:
          type: array
          items:
            type: string
        lastMessageAt:
          type: string
          format: date-time
        lastMessageText:
          type: string

  responses:
    Unauthorized:
      description: The access token is missing or it's expired
    BadRequest:
      description: The request was not compliant with the documentation (eg. missing fields, etc)
    InternalServerError:
      description: The server encountered an internal error. Further info in server logs
    Forbidden:
      description: The user is not allowed to perform this action
    NotFound:
      description: The requested resource was not found

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
